<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #EDE4DA; }
  a { color: #E9A6B3; } a:hover { color: #D8899A; }
  @keyframes sipelle-fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
</style>
</helmet>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; box-sizing: border-box;">
<x-import component-from-global-scope="IOSDevice" from="./ios-frame.jsx" hint-size="390px,844px">

  <!-- ============ SPLASH ============ -->
  <sc-if value="{{ onSplash }}" hint-placeholder-val="{{ true }}">
    <div data-screen-label="Splash" onClick="{{ goHome }}" style="position: absolute; inset: 0; cursor: pointer; background: #FBE7E6;">
      <img src="assets/splash-full.png" alt="Sipelle splash" style="width: 100%; height: 100%; object-fit: cover;">
      <div style="position: absolute; left: 0; right: 0; bottom: 46px; text-align: center; font-family: -apple-system, Helvetica, sans-serif; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #9B8F91; animation: sipelle-fade-up 900ms cubic-bezier(0.25,0.1,0.25,1) both;">Tap to begin</div>
    </div>
  </sc-if>

  <!-- ============ HOME ============ -->
  <sc-if value="{{ onHome }}" hint-placeholder-val="{{ false }}">
    <div data-screen-label="Home" style="position: absolute; inset: 0; display: flex; flex-direction: column; background: linear-gradient(180deg, #E4F5FC 0%, #F9E4E6 34%, #FBE9D9 62%, #FFFFFF 100%); font-family: -apple-system, Helvetica, sans-serif; color: #2B2528;">
      <div style="flex: 1; overflow-y: auto; padding: 62px 20px 12px; box-sizing: border-box;">

        <div style="display: flex; align-items: flex-start; justify-content: space-between;">
          <div style="display: flex; flex-direction: column; gap: 2px; padding-top: 6px;">
            <span style="font-family: 'Caveat', cursive; font-weight: 600; font-size: 34px; line-height: 1;">Sipelle</span>
            <span style="font-family: 'Caveat', cursive; font-weight: 600; font-size: 44px; line-height: 1.05; margin-top: 14px;">Hello John!</span>
            <span style="font-size: 13px; color: #4A4245; line-height: 1.4; max-width: 150px; margin-top: 8px;">What are you in the mood for today?</span>
          </div>
          <img src="assets/hero-cocktail.png" alt="" style="width: 210px; height: 233px; object-fit: cover; margin: -6px -10px 0 0; pointer-events: none;">
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 18px;">
          <sc-for list="{{ categories }}" as="cat" hint-placeholder-count="3">
            <div onClick="{{ cat.onTap }}" style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; width: 96px;" style-active="transform: scale(0.97)">
              <img src="{{ cat.img }}" alt="{{ cat.label }}" style="width: 92px; height: 92px; border-radius: 999px; box-shadow: 0 2px 8px rgba(90,70,50,0.10);">
              <span style="font-family: 'Caveat', cursive; font-weight: 600; font-size: 22px; line-height: 1;">{{ cat.label }}</span>
            </div>
          </sc-for>
        </div>

        <div style="display: flex; justify-content: center; margin-top: 10px;">
          <img src="assets/scan-menu-blob.png" alt="Scan Menu" onClick="{{ goResults }}" style="width: 190px; height: 190px; cursor: pointer; transition: transform 120ms cubic-bezier(0.25,0.1,0.25,1);" style-active="transform: scale(0.97)">
        </div>

      </div>

      <div style="display: flex; align-items: center; justify-content: space-around; height: 72px; background: #FFFFFF; border-top: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; flex-shrink: 0;">
        <img src="https://unpkg.com/lucide-static@0.462.0/icons/house.svg" alt="Home" style="width: 26px; filter: invert(76%) sepia(18%) saturate(680%) hue-rotate(300deg) brightness(98%);">
        <img src="https://unpkg.com/lucide-static@0.462.0/icons/search.svg" alt="Search" style="width: 26px; opacity: 0.4;">
        <img src="https://unpkg.com/lucide-static@0.462.0/icons/circle-user-round.svg" alt="Profile" style="width: 26px; opacity: 0.4;">
      </div>
    </div>
  </sc-if>

  <!-- ============ RESULTS ============ -->
  <sc-if value="{{ onResults }}" hint-placeholder-val="{{ false }}">
    <div data-screen-label="Results" style="position: absolute; inset: 0; display: flex; flex-direction: column; background: #F7EDE0; font-family: -apple-system, Helvetica, sans-serif; color: #2B2528;">
      <div style="flex: 1; overflow-y: auto; padding: 58px 20px 20px; box-sizing: border-box;">

        <div onClick="{{ goHome }}" style="width: 44px; height: 44px; display: flex; align-items: center; cursor: pointer; font-size: 24px; line-height: 1;">&#8592;</div>
        <div style="text-align: center; font-family: 'Playfair Display', serif; font-weight: 600; font-size: 30px; line-height: 1.05; margin-top: -8px;">Union Square</div>

        <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 24px;">
          <sc-for list="{{ drinks }}" as="d" hint-placeholder-count="3">
            <div onClick="{{ d.onTap }}" style="display: flex; gap: 14px; align-items: flex-start; background: #F3E7D8; box-shadow: 0 10px 24px rgba(90,70,50,0.14); border-radius: 28px; padding: 16px; cursor: pointer; transition: transform 120ms cubic-bezier(0.25,0.1,0.25,1);" style-active="transform: scale(0.97)">
              <img src="{{ d.img }}" alt="{{ d.name }}" style="width: 104px; height: 109px; object-fit: cover; background: #FFFFFF; border-radius: 26px; box-shadow: 0 2px 8px rgba(90,70,50,0.10); flex-shrink: 0;">
              <div style="flex: 1; display: flex; flex-direction: column; gap: 5px; padding-top: 3px; min-width: 0;">
                <div style="display: flex; align-items: flex-start; gap: 10px;">
                  <span style="flex: 1; font-family: 'Playfair Display', serif; font-weight: 600; font-size: 21px; line-height: 1.05;">{{ d.name }}</span>
                  <span style="background: #F7EDDD; box-shadow: 0 4px 10px rgba(90,70,50,0.18); border-radius: 16px; padding: 6px 11px; font-weight: 700; font-size: 16px; white-space: nowrap;">{{ d.price }}</span>
                </div>
                <span style="font-size: 16px; letter-spacing: 2px; line-height: 1;">{{ d.stars }}</span>
                <span style="font-size: 13.5px; line-height: 1.35; color: #4A4245;">{{ d.desc }}</span>
              </div>
            </div>
          </sc-for>
        </div>

        <sc-if value="{{ toast }}" hint-placeholder-val="{{ false }}">
          <div style="position: sticky; bottom: 8px; display: flex; justify-content: center; pointer-events: none;">
            <span style="background: #2B2528; color: #F7EDE0; font-size: 13.5px; padding: 10px 18px; border-radius: 999px; box-shadow: 0 6px 16px rgba(0,0,0,0.2); animation: sipelle-fade-up 200ms cubic-bezier(0.25,0.1,0.25,1) both;">{{ toast }}</span>
          </div>
        </sc-if>

      </div>
    </div>
  </sc-if>

</x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { screen: 'splash', toast: '' };

  setToast(msg) {
    clearTimeout(this._t);
    this.setState({ toast: msg });
    this._t = setTimeout(() => this.setState({ toast: '' }), 1600);
  }

  renderVals() {
    const screen = this.state.screen;
    const drinks = [
      { name: 'Aperol Spritz', price: '$14', stars: '\u2605\u2605\u2605\u2605\u2605', desc: 'Refreshing with prosecco and orange', img: 'assets/drink-aperol-spritz.png' },
      { name: 'Dirty Martini', price: '$16', stars: '\u2605\u2605\u2605\u2605\u2606', desc: 'Classic gin with an olive twist', img: 'assets/drink-dirty-martini.png' },
      { name: 'Mojito', price: '$13', stars: '\u2605\u2605\u2605\u2605\u2606', desc: 'Cool mint, lime and white rum', img: 'assets/drink-mojito.png' },
    ].map(d => ({ ...d, onTap: () => this.setToast(d.name + ' \u2014 added to favourites') }));

    const categories = [
      { label: 'Citrus', img: 'assets/category-citrus.png' },
      { label: 'Beer', img: 'assets/category-beer.png' },
      { label: 'Exotic', img: 'assets/category-exotic.png' },
    ].map(c => ({ ...c, onTap: () => this.setState({ screen: 'results' }) }));

    return {
      onSplash: screen === 'splash',
      onHome: screen === 'home',
      onResults: screen === 'results',
      toast: this.state.toast,
      drinks,
      categories,
      goHome: () => this.setState({ screen: 'home', toast: '' }),
      goResults: () => this.setState({ screen: 'results' }),
    };
  }
}
</script>
</body>
</html>
